<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory Management</title>
  <script src="script.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-top: 30px; }
    label { display: block; margin: 5px 0; }
    input, select, button { margin: 5px 0; }
  </style>
</head>
<body>

  <!-- LIST TO BUY SECTION -->
  <h2>List to Buy</h2>
  <div id="listForm"></div>
  <button onclick="loadList()">Refresh List</button>
  <button onclick="submitList()">Submit SKIP/DONE</button>

  <!-- STOCK UPDATE SECTION -->
  <h2>Stock Update</h2>
  <input type="text" id="searchBar" placeholder="Search product..." onkeyup="filterDropdown()">
  <br>
  <select id="itemDropdown"></select>
  <br>
  <input type="number" id="qty" placeholder="Quantity">
  <select id="type">
    <option value="IN">IN</option>
    <option value="OUT">OUT</option>
  </select>
  <br>
  <button onclick="submitUpdate()">Update Stock</button>

  <script>
    // Initialize dropdown when page loads
    window.onload = function() {
      loadList();
      initUpdatePage();
    };
  </script>

</body>
</html>
