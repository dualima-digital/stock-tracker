<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List to Buy</title>
  <script src="script.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-bottom: 20px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #f2f2f2;
    }
    .home-btn {
      display: block;
      margin-top: 20px;
      background: #0078D7;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body onload="loadList()">
  <h2>List to Buy</h2>
  <table id="listTable">
    <thead>
      <tr>
        <th>Item</th>
        <th>Done</th>
        <th>Skip</th>
      </tr>
    </thead>
    <tbody id="listForm"></tbody>
  </table>
  <button onclick="loadList()">Refresh List</button>
  <button onclick="submitList()">Submit</button>
  <button class="home-btn" onclick="location.href='index.html'">🏠 Home</button>
</body>
</html>
