<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stock Update</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body onload="initUpdatePage()">
  <h2>Stock Update</h2>
  <button onclick="location.href='index.html'" class="home-btn">🏠 Home</button>
  <input type="text" id="searchBar" placeholder="Search product..." onkeyup="filterDropdown()">
  <select id="itemDropdown"></select>
  <input type="number" id="qty" placeholder="Quantity">
  <select id="type">
    <option value="IN">IN</option>
    <option value="OUT">OUT</option>
  </select>
  <button type="button" onclick="submitUpdate()">Submit</button>
</body>
</html>
