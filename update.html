<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Update</title>
  <script src="script.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-bottom: 20px; }
    input, select { margin: 8px 0; padding: 6px; }
    button { margin-top: 10px; padding: 8px 16px; }
    .home-btn {
      display: block;
      margin-top: 20px;
      background: #0078D7;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body onload="initUpdatePage()">
  <h2>Stock Update</h2>
  <input type="text" id="searchBar" placeholder="Search product..." onkeyup="filterDropdown()"><br>
  <select id="itemDropdown"></select><br>
  <input type="number" id="qty" placeholder="Quantity"><br>
  <select id="type">
    <option value="IN">IN</option>
    <option value="OUT">OUT</option>
  </select><br>
  <button onclick="submitUpdate()">Update Stock</button>
  <button class="home-btn" onclick="location.href='index.html'">🏠 Home</button>
</body>
</html>
