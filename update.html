<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Update</title>
  <script src="script.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-bottom: 20px; }

    /* Form layout */
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 5px;
    }

    button {
      background: #0078D7;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }

    /* Home button */
    .home-btn {
      display: block;
      margin-top: 20px;
      background: #444;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
    }

    /* Responsive for mobile */
    @media (max-width: 600px) {
      input, select, button {
        width: 100%; /* full width on mobile */
      }
    }
  </style>
</head>
<body onload="initUpdatePage()">
  <h2>Stock Update</h2>

  <div class="form-group">
    <label for="searchBar">Search product:</label>
    <input type="text" id="searchBar" placeholder="Search product..." onkeyup="filterDropdown()">
  </div>

  <div class="form-group">
    <label for="itemDropdown">Select product:</label>
    <select id="itemDropdown"></select>
  </div>

  <div class="form-group">
    <label for="qty">Quantity:</label>
    <input type="number" id="qty" placeholder="Quantity">
  </div>

  <div class="form-group">
    <label for="type">Type:</label>
    <select id="type">
      <option value="IN">IN</option>
      <option value="OUT">OUT</option>
    </select>
  </div>

  <button onclick="submitUpdate()">Update Stock</button>
  <button class="home-btn" onclick="location.href='index.html'">🏠 Home</button>
</body>
</html>
