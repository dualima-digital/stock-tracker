<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Update</title>
  <script src="script.js"></script>
  <style>
    .home-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      background: #0078D7;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body onload="initUpdatePage()">
  <button class="home-btn" onclick="location.href='index.html'">🏠</button>
  <h2>Stock Update</h2>
  <input type="text" id="searchBar" placeholder="Search product..." onkeyup="filterDropdown()">
  <br>
  <select id="itemDropdown"></select>
  <br>
  <input type="number" id="qty" placeholder="Quantity">
  <select id="type">
    <option value="IN">IN</option>
    <option value="OUT">OUT</option>
  </select>
  <br>
  <button onclick="submitUpdate()">Update Stock</button>
</body>
</html>
